<!DOCTYPE html>
<html>
<head>
    <title>Pete's Pizza Delivery</title>
</head>
<body>

<center>
    <h1>Pete's Pizza Delivery</h1>
    <h2>Online Order Form</h2>
    <p>* required fields</p>
</center>

<form>

<fieldset>
    <legend>Customer Details</legend>

    <label>*Name:</label>
    <input type="text" required><br><br>

    <label>*Address:</label>
    <input type="text" size="50" required><br><br>

    <label>*Town/City:</label>
    <input type="text" required><br><br>

    <label>*Postcode:</label>
    <input type="text" required><br><br>

    <label>*Tel:</label>
    <input type="tel" required><br><br>

    <label>*Email:</label>
    <input type="email" size="50" required>
</fieldset>

<br>

<table border="0">
<tr>

<td>
<fieldset>
    <legend>Topping *</legend>

    <input type="radio" name="topping"> Margherita <br>
    <input type="radio" name="topping"> Four Seasons <br>
    <input type="radio" name="topping"> Meat Feast
</fieldset>
</td>

<td>
<fieldset>
    <legend>Size *</legend>

    <input type="radio" name="size"> Small <br>
    <input type="radio" name="size"> Medium <br>
    <input type="radio" name="size"> Large
</fieldset>
</td>

<td>
<fieldset>
    <legend>Extras</legend>

    <input type="checkbox"> Mushrooms <br>
    <input type="checkbox"> Green Peppers <br>
    <input type="checkbox"> Anchovies <br>
    <input type="checkbox"> Extra Cheese
</fieldset>
</td>

</tr>
</table>

<fieldset>
    <legend>Delivery</legend>

    Preferred delivery time:
    <input type="time"><br><br>

    Delivery instructions:<br>
    <textarea rows="5" cols="60"></textarea>
</fieldset>

<br>

<center>
    <input type="submit" value="Submit order">
</center>

</form>

</body>
</html>
