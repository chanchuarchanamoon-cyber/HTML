<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ordered lists</h1>
    <div>
        <h4>Fruits</h4>
        <ol>
            <li>Apple</li>
            <li>Banana</li>
            <li>Cherry</li>
        </ol>
    </div>
    <div>
        <h3>Vegetables</h3>
        <ol type="A">
            <li>Carrot</li>
            <li>Broccoli</li>
            <li>Spinach</li>
        </ol>
    </div>
    <div>
        <h3>Games</h3>
        <ol type="I">
            <li>Football</li>
            <li>Basketball</li>
            <li>Tennis</li>
            </ol>
    </div>
</body>
</html>
